<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Team Task Manager API</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #f1f5f9; color: #0f172a; display: grid; place-items: center; min-height: 100vh; margin: 0; padding: 1rem; }
      .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 2rem 2.5rem; box-shadow: 0 4px 16px -8px rgba(15,23,42,0.12); max-width: 32rem; }
      h1 { margin: 0 0 0.5rem; font-size: 1.25rem; }
      code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
      p { margin: 0.5rem 0; color: #475569; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Team Task Manager API</h1>
      <p>This is the backend service. Try <code>/health</code> for a status check.</p>
      <p>The frontend lives at a separate URL.</p>
    </div>
  </body>
</html>
